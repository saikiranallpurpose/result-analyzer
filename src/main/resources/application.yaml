server:
  port: 8080

spring:
  datasource:
    # Add ;DB_CLOSE_ON_EXIT=FALSE and ensure the name is exact
    url: jdbc:h2:mem:result-analyzer-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
      # Add this line to stop the console from switching settings
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true